name : Devops CI Pipeline

on:
  push:
    branches:["main","dev"]
  pull_request:
  workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      strategy:
        matrix:
          python-version: ["3.9","3.10"]
        env:
          ENV_NAME: prod


         steps:
           - name: Checkout code
             uses: actions/checkout@v3

          - name: Setup Python
            uses: actions/setup-python@v4
            with:
              python-version: ${{matrix.python-version}}

          - name: Cache pip
            uses: actions/cache@v3
            with:
              path: ~/.cache/pip
              key: ${{runner.os}}-pip-$
            {{ hashFiles('requirements.txt') }}
          - name: Install dependencies 
            run: |
              if [ -f requirements.txt]; then
                pip install -r requirements.txt
              else
                echo "No requirements file"
              fi
          - name: Run app
            run: |
              python app.py> outpir.log 2>&1 || true

          - name: show logs
            if : always ()
            run: cat output.log
            
          
