name: AI pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code 
      uses: actions/checkout@v3
    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: | 
          pip install -r .github/workflows/requirements.txt
    - name: Run app.py
      run: python .github/workflows/app.py 
    - name: Run RAG Analyzer
      if: failure()
      run: |
        echo "Pipeline failed ! running rag Analyzer"
        python .github/workflows/rag.py
